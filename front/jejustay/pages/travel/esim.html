    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ============================================
            // 1. Core UI Logic (Accordion, Search) - Run this FIRST
            // ============================================

            // Feature List Accordion (Marketing) - ScrollHeight Method
            const featureHeaders = document.querySelectorAll('.feature-header');
            featureHeaders.forEach(header => {
                header.addEventListener('click', () => {
                    const currentItem = header.parentElement;
                    const currentBody = currentItem.querySelector('.feature-body');

                    if (!currentBody) return;

                    // 1. Close ALL other items
                    featureHeaders.forEach(otherHeader => {
                        const otherItem = otherHeader.parentElement;
                        if (otherItem !== currentItem && otherItem.classList.contains('active')) {
                            otherItem.classList.remove('active');
                            otherItem.querySelector('.feature-body').style.maxHeight = null;
                        }
                    });

                    // 2. Toggle CURRENT item
                    const isActive = currentItem.classList.contains('active');
                    if (isActive) {
                        currentItem.classList.remove('active');
                        currentBody.style.maxHeight = null;
                    } else {
                        currentItem.classList.add('active');
                        currentBody.style.maxHeight = currentBody.scrollHeight + "px";
                    }
                });
            });

            // FAQ Accordion
            document.querySelectorAll('.faq-question').forEach(btn => {
                btn.addEventListener('click', () => {
                    const item = btn.parentElement;
                    item.classList.toggle('active');
                });
            });

            // Search Input Dropdown
            const searchInput = document.getElementById('searchInput');
            const searchDropdown = document.getElementById('searchDropdown');

            if (searchInput && searchDropdown) {
                searchInput.addEventListener('focus', () => {
                    searchDropdown.classList.add('active');
                });

                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.search-box')) {
                        searchDropdown.classList.remove('active');
                    }
                });
            }

            // Destination item click
            document.querySelectorAll('.destination-item').forEach(item => {
                item.addEventListener('click', () => {
                    if (searchInput) searchInput.value = item.dataset.country;
                    if (searchDropdown) searchDropdown.classList.remove('active');
                });
            });

            // ============================================
            // 2. External Libraries (Lucide) - Run LAST & Safely
            // ============================================
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            } else {
                console.warn('Lucide icons library failed to load.');
            }
        });
    </script>
    <script type="module" src="../../../components/runtime/bootstrap.js"></script>
